---
# Synopsis: Suppress Rules for the Document Knowledge Mining solution accelerator pattern module.
apiVersion: github.com/microsoft/PSRule/v1
kind: SuppressionGroup
metadata:
  name: "SuppressDocumentKnowledgeMining"
spec:
  rule:
    - Azure.ACR.GeoReplica # ACR geo-replication requires user input via the `enableRedundancy` parameter (Premium SKU + replica region) and is opt-in for the min/defaults configuration.
    - Azure.Storage.Firewall # Storage firewall (networkAcls.defaultAction=Deny) is enabled when `enablePrivateNetworking` is true and is opt-in for the min/defaults configuration.
  if:
    source: Template
    withinPath:
      - avm/ptn/sa/document-knowledge-mining/tests/e2e/defaults/
