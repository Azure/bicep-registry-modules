name: "avm.res.db-for-my-sql.flexible-server"

on:
  workflow_dispatch:
    inputs:
      staticValidation:
        type: boolean
        description: "Execute static validation"
        required: false
        default: true
      deploymentValidation:
        type: boolean
        description: "Execute deployment validation"
        required: false
        default: true
      removeDeployment:
        type: boolean
        description: "Remove deployed module"
        required: false
        default: true
      customLocation:
        type: string
        description: "Default location overwrite (e.g., eastus)"
        required: false
  push:
    branches:
      - main
    paths:
      - ".github/actions/templates/avm-**"
      - ".github/workflows/avm.template.module.yml"
      - ".github/workflows/avm.res.db-for-my-sql.flexible-server.yml"
      - "avm/res/db-for-my-sql/flexible-server/**"
      - "utilities/pipelines/**"
      - "!utilities/pipelines/platform/**"
      - "!*/**/child-module-publish-allowed-list.json"
      - "!*/**/README.md"

env:
  modulePath: "avm/res/db-for-my-sql/flexible-server"
  workflowPath: ".github/workflows/avm.res.db-for-my-sql.flexible-server.yml"

concurrency:
  group: ${{ github.workflow }}

jobs:
  ####################################
  #   List available MySQL SKUs      #
  ####################################
  job_list_mysql_skus:
    runs-on: ubuntu-latest
    name: "List available MySQL Flexible Server SKUs"
    if: ${{ !cancelled() && !(github.repository != 'Azure/bicep-registry-modules' && github.event_name != 'workflow_dispatch') }}
    permissions:
      id-token: write
    steps:
      - name: "Azure Login"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: "List MySQL Flexible Server SKUs per region"
        shell: bash
        run: |
          echo "===================================="
          echo "Fetching available regions for Microsoft.DBforMySQL/flexibleServers..."
          echo "===================================="
          regions=$(az provider show --namespace Microsoft.DBforMySQL \
            --query "resourceTypes[?resourceType=='flexibleServers'].locations[]" -o tsv)
          for region in $regions; do
            # Convert display name to CLI location name (e.g., "East US" -> "eastus")
            locationName=$(echo "$region" | tr '[:upper:]' '[:lower:]' | tr -d ' ')
            echo ""
            echo "====== Region: $region ($locationName) ======"
            skus=$(az mysql flexible-server list-skus -l "$locationName" -o json 2>/dev/null || echo "[]")
            if [ "$skus" = "[]" ]; then
              echo "  No SKUs available"
            else
              echo "$skus" | jq -r '
                .[] |
                .supportedFlexibleServerEditions[]? |
                .name as $edition |
                .supportedServerVersions[]? |
                .name as $version |
                .supportedSkus[]? |
                "  Edition: \($edition) | Version: \($version) | SKU: \(.name) | vCores: \(.supportedVcores)"
              ' 2>/dev/null || echo "  Could not parse SKU data"
            fi
          done

  ###########################
  #   Initialize pipeline   #
  ###########################
  job_initialize_pipeline:
    runs-on: ubuntu-latest
    name: "Initialize pipeline"
    if: ${{ !cancelled() && !(github.repository != 'Azure/bicep-registry-modules' && github.event_name != 'workflow_dispatch') }}
    needs:
      - job_list_mysql_skus
    steps:
      - name: "Checkout"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: "Set input parameters to output variables"
        id: get-workflow-param
        uses: ./.github/actions/templates/avm-getWorkflowInput
        with:
          workflowPath: "${{ env.workflowPath}}"
      - name: "Get module test file paths"
        id: get-module-test-file-paths
        uses: ./.github/actions/templates/avm-getModuleTestFiles
        with:
          modulePath: "${{ env.modulePath }}"
    outputs:
      workflowInput: ${{ steps.get-workflow-param.outputs.workflowInput }}
      moduleTestFilePaths: ${{ steps.get-module-test-file-paths.outputs.moduleTestFilePaths }}
      psRuleModuleTestFilePaths: ${{ steps.get-module-test-file-paths.outputs.psRuleModuleTestFilePaths }}
      modulePath: "${{ env.modulePath }}"

  ##############################
  #   Call reusable workflow   #
  ##############################
  call-workflow-passing-data:
    name: "Run"
    permissions:
      id-token: write # For OIDC
      contents: write # For release tags
    needs:
      - job_initialize_pipeline
    uses: ./.github/workflows/avm.template.module.yml
    with:
      workflowInput: "${{ needs.job_initialize_pipeline.outputs.workflowInput }}"
      moduleTestFilePaths: "${{ needs.job_initialize_pipeline.outputs.moduleTestFilePaths }}"
      psRuleModuleTestFilePaths: "${{ needs.job_initialize_pipeline.outputs.psRuleModuleTestFilePaths }}"
      modulePath: "${{ needs.job_initialize_pipeline.outputs.modulePath}}"
    secrets: inherit
