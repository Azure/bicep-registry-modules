# Workflow to verify that new modules are registered in the official allowlist
name: .Platform - Verify New Module Registration

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "avm/**/main.bicep"

jobs:
  verify-new-module:
    name: Verify New Module Registration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            avm/**/main.bicep

      - name: Detect changed modules
        id: detect-modules
        shell: pwsh
        run: |
          $result = ./utilities/platform/onboarding/Get-ChangedModules.ps1 `
            -ChangedFiles '${{ steps.changed-files.outputs.all_changed_files }}' | ConvertFrom-Json

          # Set outputs for GitHub Actions
          "has_changed_modules=$($result.hasChangedModules.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          "changed_modules=$($result.changedModules | ConvertTo-Json -Compress)" >> $env:GITHUB_OUTPUT

      - name: Fetch registered modules list
        id: fetch-list
        if: steps.detect-modules.outputs.has_changed_modules == 'true'
        shell: pwsh
        run: |
          ./utilities/platform/onboarding/Get-RegisteredModulesList.ps1 -OutputFile 'allowlist.json'

      - name: Verify modules are registered
        if: steps.detect-modules.outputs.has_changed_modules == 'true'
        shell: pwsh
        run: |
          ./utilities/platform/onboarding/Test-ModulesRegistered.ps1 `
            -ModulesJson '${{ steps.detect-modules.outputs.changed_modules }}' `
            -AllowlistFile 'allowlist.json'

